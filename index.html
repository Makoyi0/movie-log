<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CineFile — My Movie Journal</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #0a0a0f;
      --surface: #13131a;
      --surface2: #1c1c27;
      --border: #2a2a3a;
      --accent: #e8b86d;
      --accent2: #c0392b;
      --text: #e8e6e0;
      --muted: #7a7a8a;
      --green: #4caf7d;
      --red: #e05c5c;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-weight: 300;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* Grain overlay */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 9999;
      opacity: 0.4;
    }

    /* Header */
    header {
      border-bottom: 1px solid var(--border);
      padding: 2rem 2rem 1.5rem;
      display: flex;
      align-items: flex-end;
      gap: 1.5rem;
      flex-wrap: wrap;
    }

    .logo {
      font-family: 'Playfair Display', serif;
      font-size: clamp(2rem, 5vw, 3rem);
      font-weight: 700;
      letter-spacing: -0.02em;
      line-height: 1;
    }

    .logo span {
      color: var(--accent);
      font-style: italic;
    }

    .tagline {
      color: var(--muted);
      font-size: 0.8rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      padding-bottom: 0.3rem;
    }

    /* Controls bar */
    .controls {
      padding: 1.25rem 2rem;
      display: flex;
      gap: 0.75rem;
      flex-wrap: wrap;
      align-items: center;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
    }

    .controls input[type="text"],
    .controls select {
      background: var(--bg);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 0.55rem 0.9rem;
      border-radius: 6px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.85rem;
      outline: none;
      transition: border-color 0.2s;
    }

    .controls input[type="text"] { width: 220px; }
    .controls input[type="text"]:focus,
    .controls select:focus { border-color: var(--accent); }
    .controls select { cursor: pointer; }

    .btn-add {
      margin-left: auto;
      background: var(--accent);
      color: #0a0a0f;
      border: none;
      padding: 0.55rem 1.2rem;
      border-radius: 6px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.85rem;
      font-weight: 500;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
    }
    .btn-add:hover { opacity: 0.85; transform: translateY(-1px); }

    /* Stats bar */
    .stats-bar {
      padding: 0.75rem 2rem;
      display: flex;
      gap: 2rem;
      font-size: 0.78rem;
      color: var(--muted);
      letter-spacing: 0.05em;
      border-bottom: 1px solid var(--border);
    }
    .stats-bar span b { color: var(--accent); font-weight: 500; }

    /* Movie grid */
    .movie-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 1.25rem;
      padding: 1.5rem 2rem;
    }

    .movie-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      transition: transform 0.2s, border-color 0.2s, box-shadow 0.2s;
      animation: cardIn 0.4s ease both;
    }
    @keyframes cardIn {
      from { opacity: 0; transform: translateY(16px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .movie-card:hover {
      transform: translateY(-3px);
      border-color: var(--accent);
      box-shadow: 0 8px 30px rgba(232,184,109,0.08);
    }

    .card-header {
      padding: 1.1rem 1.2rem 0.7rem;
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 0.5rem;
    }

    .card-title {
      font-family: 'Playfair Display', serif;
      font-size: 1.05rem;
      font-weight: 700;
      line-height: 1.3;
      flex: 1;
    }

    .badge-genre {
      font-size: 0.65rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      background: var(--surface2);
      border: 1px solid var(--border);
      padding: 0.2rem 0.5rem;
      border-radius: 4px;
      color: var(--muted);
      white-space: nowrap;
      flex-shrink: 0;
    }

    .card-director {
      padding: 0 1.2rem 0.5rem;
      font-size: 0.78rem;
      color: var(--muted);
      font-style: italic;
    }

    .card-synopsis {
      padding: 0 1.2rem 0.9rem;
      font-size: 0.8rem;
      color: #aaa8a0;
      line-height: 1.55;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    /* Status */
    .card-status {
      padding: 0 1.2rem 0.7rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .status-label {
      font-size: 0.72rem;
      color: var(--muted);
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }

    .status-select {
      font-size: 0.78rem;
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 0.25rem 0.5rem;
      border-radius: 4px;
      font-family: 'DM Sans', sans-serif;
      cursor: pointer;
      outline: none;
      transition: border-color 0.2s;
      flex: 1;
    }
    .status-select:focus { border-color: var(--accent); }
    .status-select.completed { border-color: var(--green); color: var(--green); }
    .status-select.watching { border-color: var(--accent); color: var(--accent); }
    .status-select.plan-to-watch { border-color: var(--muted); color: var(--muted); }

    /* Ratings */
    .card-ratings {
      padding: 0.6rem 1.2rem;
      border-top: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      gap: 0.45rem;
    }

    .rating-row {
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .rating-label {
      font-size: 0.7rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      width: 76px;
      flex-shrink: 0;
    }

    .stars {
      display: flex;
      gap: 2px;
    }

    .star {
      cursor: pointer;
      font-size: 0.9rem;
      color: var(--border);
      transition: color 0.15s, transform 0.1s;
      user-select: none;
    }
    .star:hover { transform: scale(1.2); }
    .star.filled { color: var(--accent); }

    /* Recommend */
    .card-recommend {
      padding: 0.7rem 1.2rem;
      border-top: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 0.6rem;
    }

    .rec-label {
      font-size: 0.7rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      flex: 1;
    }

    .btn-thumb {
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--muted);
      width: 34px;
      height: 34px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 1rem;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
      position: relative;
      overflow: hidden;
    }

    .btn-thumb.active-up {
      background: rgba(76,175,125,0.15);
      border-color: var(--green);
      color: var(--green);
      animation: thumbUp 0.5s ease;
    }
    .btn-thumb.active-down {
      background: rgba(224,92,92,0.15);
      border-color: var(--red);
      color: var(--red);
      animation: thumbDown 0.5s ease;
    }

    @keyframes thumbUp {
      0% { transform: scale(1); }
      30% { transform: scale(1.4) rotate(-15deg); }
      60% { transform: scale(0.9) rotate(5deg); }
      100% { transform: scale(1) rotate(0); }
    }
    @keyframes thumbDown {
      0% { transform: scale(1); }
      30% { transform: scale(1.4) rotate(15deg); }
      60% { transform: scale(0.9) rotate(-5deg); }
      100% { transform: scale(1) rotate(0); }
    }

    /* Confetti burst */
    .confetti-container {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 10000;
    }

    .confetti-piece {
      position: absolute;
      width: 8px;
      height: 8px;
      border-radius: 2px;
      animation: confettiFall 1.2s ease-in forwards;
    }

    @keyframes confettiFall {
      0% { transform: translateY(-20px) rotate(0deg); opacity: 1; }
      100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
    }

    /* Card footer */
    .card-footer {
      padding: 0.7rem 1.2rem;
      border-top: 1px solid var(--border);
      display: flex;
      justify-content: flex-end;
    }

    .btn-delete {
      background: none;
      border: 1px solid var(--border);
      color: var(--muted);
      padding: 0.3rem 0.7rem;
      border-radius: 4px;
      font-size: 0.72rem;
      cursor: pointer;
      font-family: 'DM Sans', sans-serif;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      transition: all 0.2s;
    }
    .btn-delete:hover {
      border-color: var(--red);
      color: var(--red);
      background: rgba(224,92,92,0.08);
    }

    /* Empty state */
    .empty-state {
      grid-column: 1/-1;
      text-align: center;
      padding: 4rem 2rem;
      color: var(--muted);
    }
    .empty-state p { font-size: 1rem; margin-top: 0.5rem; }

    /* Modal */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.75);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      padding: 1rem;
      animation: fadeIn 0.2s ease;
    }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

    .modal {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 2rem;
      width: 100%;
      max-width: 480px;
      animation: slideUp 0.25s ease;
    }
    @keyframes slideUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .modal h2 {
      font-family: 'Playfair Display', serif;
      font-size: 1.4rem;
      margin-bottom: 1.5rem;
    }

    .form-group {
      margin-bottom: 1rem;
    }

    .form-group label {
      display: block;
      font-size: 0.75rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin-bottom: 0.4rem;
    }

    .form-group input,
    .form-group select,
    .form-group textarea {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 0.6rem 0.9rem;
      border-radius: 6px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.85rem;
      outline: none;
      transition: border-color 0.2s;
    }
    .form-group input:focus,
    .form-group select:focus,
    .form-group textarea:focus { border-color: var(--accent); }
    .form-group textarea { resize: vertical; min-height: 80px; }

    .modal-actions {
      display: flex;
      gap: 0.75rem;
      margin-top: 1.5rem;
      justify-content: flex-end;
    }

    .btn-cancel {
      background: none;
      border: 1px solid var(--border);
      color: var(--muted);
      padding: 0.55rem 1.1rem;
      border-radius: 6px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.85rem;
      cursor: pointer;
      transition: border-color 0.2s;
    }
    .btn-cancel:hover { border-color: var(--text); color: var(--text); }

    .btn-save {
      background: var(--accent);
      color: #0a0a0f;
      border: none;
      padding: 0.55rem 1.2rem;
      border-radius: 6px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.85rem;
      font-weight: 500;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    .btn-save:hover { opacity: 0.85; }

    /* Responsive */
    @media (max-width: 600px) {
      header, .controls, .stats-bar, .movie-grid { padding-left: 1rem; padding-right: 1rem; }
      .controls input[type="text"] { width: 100%; }
      .btn-add { width: 100%; text-align: center; margin-left: 0; }
      .movie-grid { grid-template-columns: 1fr; }
    }

    /* Nomination badge */
    .oscar-badge {
      display: inline-flex;
      align-items: center;
      gap: 0.3rem;
      font-size: 0.62rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--accent);
      padding: 0 1.2rem 0.6rem;
    }

    /* Watched year field */
    .card-meta {
      padding: 0 1.2rem 0.5rem;
      font-size: 0.75rem;
      color: var(--muted);
      display: flex;
      gap: 1rem;
    }
    .card-meta span b { color: var(--text); font-weight: 400; }
  </style>
</head>
<body>

  <header>
    <div class="logo">Cine<span>File</span></div>
    <div class="tagline">Your personal movie journal</div>
  </header>

  <div class="controls">
    <input type="text" id="searchInput" placeholder="🔍 Search by title or director…" oninput="renderMovies()" />
    <select id="filterStatus" onchange="renderMovies()">
      <option value="">All statuses</option>
      <option value="plan-to-watch">Plan to Watch</option>
      <option value="watching">Watching</option>
      <option value="completed">Completed</option>
    </select>
    <select id="filterGenre" onchange="renderMovies()">
      <option value="">All genres</option>
    </select>
    <select id="sortBy" onchange="renderMovies()">
      <option value="default">Sort: Default</option>
      <option value="title-asc">Title A→Z</option>
      <option value="title-desc">Title Z→A</option>
      <option value="rating-desc">Highest Rated</option>
      <option value="director">Director</option>
    </select>
    <button class="btn-add" onclick="openModal()">+ Add Movie</button>
  </div>

  <div class="stats-bar" id="statsBar"></div>

  <div class="movie-grid" id="movieGrid"></div>

  <!-- Add Movie Modal -->
  <div class="modal-overlay" id="modalOverlay" style="display:none">
    <div class="modal">
      <h2>Add a Movie</h2>
      <div class="form-group">
        <label>Title *</label>
        <input type="text" id="newTitle" placeholder="e.g. The Godfather" />
      </div>
      <div class="form-group">
        <label>Director *</label>
        <input type="text" id="newDirector" placeholder="e.g. Francis Ford Coppola" />
      </div>
      <div class="form-group">
        <label>Genre</label>
        <input type="text" id="newGenre" placeholder="e.g. Drama, Thriller" />
      </div>
      <div class="form-group">
        <label>Year Released</label>
        <input type="text" id="newYear" placeholder="e.g. 2025" />
      </div>
      <div class="form-group">
        <label>Synopsis</label>
        <textarea id="newSynopsis" placeholder="Brief description of the film…"></textarea>
      </div>
      <div class="form-group">
        <label>Status</label>
        <select id="newStatus">
          <option value="plan-to-watch">Plan to Watch</option>
          <option value="watching">Watching</option>
          <option value="completed">Completed</option>
        </select>
      </div>
      <div class="modal-actions">
        <button class="btn-cancel" onclick="closeModal()">Cancel</button>
        <button class="btn-save" onclick="addMovie()">Add Movie</button>
      </div>
    </div>
  </div>

  <!-- Confetti container -->
  <div class="confetti-container" id="confettiContainer"></div>

  <script>
    let movies = [
      {
        id: 1,
        title: "Sinners",
        director: "Ryan Coogler",
        genre: "Horror",
        year: "2025",
        synopsis: "Twin brothers return to their Mississippi Delta hometown to start fresh, only to encounter a supernatural evil lurking in the Jim Crow-era South. A blood-soaked tale of blues, vampires, and belonging.",
        status: "plan-to-watch",
        ratings: { storytelling: 0, acting: 0, overall: 0 },
        recommend: null,
        oscars: true
      },
      {
        id: 2,
        title: "One Battle After Another",
        director: "Paul Thomas Anderson",
        genre: "Comedy / Drama",
        year: "2025",
        synopsis: "A washed-up revolutionary living off-grid with his spirited daughter is thrust back into chaos when his evil nemesis returns. An epic screwball adventure starring Leonardo DiCaprio.",
        status: "completed",
        ratings: { storytelling: 5, acting: 4, overall: 4 },
        recommend: "up",
        oscars: true
      },
      {
        id: 3,
        title: "Hamnet",
        director: "Chloé Zhao",
        genre: "Historical Drama",
        year: "2025",
        synopsis: "After losing their son Hamnet to plague, Agnes and William Shakespeare navigate grief in 16th-century England. A Golden Globe-winning portrait of loss, love, and the birth of a masterpiece.",
        status: "completed",
        ratings: { storytelling: 5, acting: 5, overall: 5 },
        recommend: "up",
        oscars: true
      },
      {
        id: 4,
        title: "Frankenstein",
        director: "Guillermo del Toro",
        genre: "Gothic Horror",
        year: "2025",
        synopsis: "Guillermo del Toro reimagines Mary Shelley's classic, finding the humanity in one of cinema's most iconic monsters. Jacob Elordi delivers a standout performance as the creature.",
        status: "watching",
        ratings: { storytelling: 3, acting: 4, overall: 3 },
        recommend: null,
        oscars: true
      },
      {
        id: 5,
        title: "Marty Supreme",
        director: "Josh Safdie",
        genre: "Sports Drama",
        year: "2025",
        synopsis: "Timothée Chalamet stars as Marty Mauser, a young man who will do anything to become a champion table tennis player. A propulsive epic about obsession, greatness, and toxic ambition.",
        status: "plan-to-watch",
        ratings: { storytelling: 0, acting: 0, overall: 0 },
        recommend: null,
        oscars: true
      },
      {
        id: 6,
        title: "The Secret Agent",
        director: "Kleber Mendonça Filho",
        genre: "Political Thriller",
        year: "2025",
        synopsis: "Set in 1977, a technology expert flees a mysterious past and returns to Recife, Brazil — only to find the city offers no refuge. A grindhouse-tinged social thriller with biting commentary.",
        status: "plan-to-watch",
        ratings: { storytelling: 0, acting: 0, overall: 0 },
        recommend: null,
        oscars: true
      },
      {
        id: 7,
        title: "F1",
        director: "Joseph Kosinski",
        genre: "Action / Sports",
        year: "2025",
        synopsis: "Brad Pitt plays a veteran Formula One driver who comes out of retirement to mentor a younger teammate. A kinetic, visually spectacular ride through the world of elite motorsport.",
        status: "completed",
        ratings: { storytelling: 3, acting: 3, overall: 4 },
        recommend: "down",
        oscars: true
      }
    ];

    let nextId = 8;

    function saveToStorage() {
      localStorage.setItem('cinefile-movies', JSON.stringify(movies));
    }

    function getAvgRating(ratings) {
      const vals = Object.values(ratings).filter(v => v > 0);
      if (!vals.length) return null;
      return (vals.reduce((a, b) => a + b, 0) / vals.length).toFixed(1);
    }

    function updateStats() {
      const total = movies.length;
      const watched = movies.filter(m => m.status === 'completed').length;
      const watching = movies.filter(m => m.status === 'watching').length;
      const planned = movies.filter(m => m.status === 'plan-to-watch').length;
      document.getElementById('statsBar').innerHTML = `
        <span><b>${total}</b> films</span>
        <span><b>${watched}</b> completed</span>
        <span><b>${watching}</b> watching</span>
        <span><b>${planned}</b> planned</span>
      `;
    }

    function populateGenreFilter() {
      const genres = [...new Set(movies.map(m => m.genre))].sort();
      const sel = document.getElementById('filterGenre');
      const current = sel.value;
      sel.innerHTML = '<option value="">All genres</option>';
      genres.forEach(g => {
        const o = document.createElement('option');
        o.value = g; o.textContent = g;
        if (g === current) o.selected = true;
        sel.appendChild(o);
      });
    }

    function renderMovies() {
      const search = document.getElementById('searchInput').value.toLowerCase();
      const statusFilter = document.getElementById('filterStatus').value;
      const genreFilter = document.getElementById('filterGenre').value;
      const sortBy = document.getElementById('sortBy').value;

      let list = movies.filter(m => {
        const matchSearch = m.title.toLowerCase().includes(search) || m.director.toLowerCase().includes(search);
        const matchStatus = !statusFilter || m.status === statusFilter;
        const matchGenre = !genreFilter || m.genre === genreFilter;
        return matchSearch && matchStatus && matchGenre;
      });

      if (sortBy === 'title-asc') list.sort((a,b) => a.title.localeCompare(b.title));
      else if (sortBy === 'title-desc') list.sort((a,b) => b.title.localeCompare(a.title));
      else if (sortBy === 'rating-desc') list.sort((a,b) => (getAvgRating(b.ratings)||0) - (getAvgRating(a.ratings)||0));
      else if (sortBy === 'director') list.sort((a,b) => a.director.localeCompare(b.director));

      const grid = document.getElementById('movieGrid');
      grid.innerHTML = '';

      if (list.length === 0) {
        grid.innerHTML = '<div class="empty-state"><div style="font-size:2rem">🎬</div><p>No movies match your search.</p></div>';
        updateStats();
        return;
      }

      list.forEach(m => grid.appendChild(createCard(m)));
      updateStats();
      populateGenreFilter();
    }

    function createCard(m) {
      const avg = getAvgRating(m.ratings);
      const card = document.createElement('div');
      card.className = 'movie-card';
      card.dataset.id = m.id;

      card.innerHTML = `
        <div class="card-header">
          <div class="card-title">${m.title}</div>
          <span class="badge-genre">${m.genre}</span>
        </div>
        ${m.oscars ? '<div class="oscar-badge">⭐ 2026 Oscar Nominee — Best Picture</div>' : ''}
        <div class="card-director">dir. ${m.director}${m.year ? ` &nbsp;·&nbsp; ${m.year}` : ''}</div>
        <div class="card-synopsis">${m.synopsis}</div>

        <div class="card-status">
          <span class="status-label">Status</span>
          <select class="status-select ${m.status}" onchange="changeStatus(${m.id}, this)">
            <option value="plan-to-watch" ${m.status==='plan-to-watch'?'selected':''}>📋 Plan to Watch</option>
            <option value="watching" ${m.status==='watching'?'selected':''}>🎥 Watching</option>
            <option value="completed" ${m.status==='completed'?'selected':''}>✅ Completed</option>
          </select>
        </div>

        <div class="card-ratings">
          ${renderRatingRow(m, 'storytelling', 'Storytelling')}
          ${renderRatingRow(m, 'acting', 'Acting')}
          ${renderRatingRow(m, 'overall', 'Overall')}
          ${avg ? `<div style="font-size:0.72rem;color:var(--accent);text-align:right;margin-top:2px;">avg ${avg} / 5</div>` : ''}
        </div>

        <div class="card-recommend">
          <span class="rec-label">Recommend?</span>
          <button class="btn-thumb ${m.recommend==='up'?'active-up':''}" onclick="setRecommend(${m.id},'up',this)" title="Yes, recommend">👍</button>
          <button class="btn-thumb ${m.recommend==='down'?'active-down':''}" onclick="setRecommend(${m.id},'down',this)" title="Don't recommend">👎</button>
        </div>

        <div class="card-footer">
          <button class="btn-delete" onclick="deleteMovie(${m.id})">Remove</button>
        </div>
      `;
      return card;
    }

    function renderRatingRow(m, key, label) {
      let stars = '';
      for (let i = 1; i <= 5; i++) {
        stars += `<span class="star ${m.ratings[key] >= i ? 'filled' : ''}" onclick="setRating(${m.id},'${key}',${i})">★</span>`;
      }
      return `<div class="rating-row"><span class="rating-label">${label}</span><div class="stars">${stars}</div></div>`;
    }

    function setRating(id, key, val) {
      const m = movies.find(m => m.id === id);
      if (!m) return;
      m.ratings[key] = m.ratings[key] === val ? 0 : val; // toggle off if same
      saveToStorage();
      renderMovies();
    }

    function changeStatus(id, sel) {
      const m = movies.find(m => m.id === id);
      if (!m) return;
      const prev = m.status;
      m.status = sel.value;
      sel.className = `status-select ${m.status}`;
      if (m.status === 'completed' && prev !== 'completed') {
        launchConfetti(sel);
      }
      saveToStorage();
      updateStats();
    }

    function setRecommend(id, val, btn) {
      const m = movies.find(m => m.id === id);
      if (!m) return;
      m.recommend = m.recommend === val ? null : val;
      saveToStorage();
      // Re-render just the buttons
      const card = document.querySelector(`.movie-card[data-id="${id}"]`);
      if (!card) return;
      const btns = card.querySelectorAll('.btn-thumb');
      btns[0].className = `btn-thumb ${m.recommend==='up'?'active-up':''}`;
      btns[1].className = `btn-thumb ${m.recommend==='down'?'active-down':''}`;
    }

    function deleteMovie(id) {
      movies = movies.filter(m => m.id !== id);
      saveToStorage();
      populateGenreFilter();
      renderMovies();
    }

    function launchConfetti(el) {
      const container = document.getElementById('confettiContainer');
      const colors = ['#e8b86d','#4caf7d','#c0392b','#e8e6e0','#7a7a8a','#fff'];
      for (let i = 0; i < 60; i++) {
        const piece = document.createElement('div');
        piece.className = 'confetti-piece';
        piece.style.left = Math.random() * 100 + 'vw';
        piece.style.top = '-10px';
        piece.style.background = colors[Math.floor(Math.random() * colors.length)];
        piece.style.animationDuration = (0.8 + Math.random() * 0.8) + 's';
        piece.style.animationDelay = (Math.random() * 0.4) + 's';
        piece.style.width = (5 + Math.random() * 6) + 'px';
        piece.style.height = (5 + Math.random() * 6) + 'px';
        container.appendChild(piece);
        setTimeout(() => piece.remove(), 1800);
      }
    }

    function openModal() {
      document.getElementById('modalOverlay').style.display = 'flex';
      document.getElementById('newTitle').focus();
    }

    function closeModal() {
      document.getElementById('modalOverlay').style.display = 'none';
      ['newTitle','newDirector','newGenre','newYear','newSynopsis'].forEach(id => document.getElementById(id).value = '');
      document.getElementById('newStatus').value = 'plan-to-watch';
    }

    function addMovie() {
      const title = document.getElementById('newTitle').value.trim();
      const director = document.getElementById('newDirector').value.trim();
      if (!title || !director) { alert('Title and Director are required.'); return; }
      movies.unshift({
        id: nextId++,
        title,
        director,
        genre: document.getElementById('newGenre').value.trim() || 'Unknown',
        year: document.getElementById('newYear').value.trim(),
        synopsis: document.getElementById('newSynopsis').value.trim(),
        status: document.getElementById('newStatus').value,
        ratings: { storytelling: 0, acting: 0, overall: 0 },
        recommend: null,
        oscars: false
      });
      saveToStorage();
      closeModal();
      populateGenreFilter();
      renderMovies();
    }

    // Close modal on overlay click
    document.getElementById('modalOverlay').addEventListener('click', function(e) {
      if (e.target === this) closeModal();
    });

    // Init
    populateGenreFilter();
    renderMovies();
  </script>
</body>
</html>
